<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09 — Bulk CSV upload modal (empty) — Opollo Wireframe</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-opollo-sprite>
<div class="app-shell"><aside class="app-shell__sidebar"></aside><header class="app-shell__topbar"></header><main class="app-shell__content"></main></div>
<div class="modal-backdrop">
  <div class="modal">
    <div class="modal__head">
      <h2 class="modal__title">Bulk scheduling</h2>
      <button class="modal__close" aria-label="Close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="modal__body" style="padding: 0;">
      
    <div class="bulk-upload">
      <div class="bulk-upload__illo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
        </svg>
      </div>
      <h3 class="bulk-upload__title">Import from a CSV file</h3>
      <p class="bulk-upload__subtitle">Up to 100 posts from one table.</p>
      <a href="#" class="bulk-upload__info">More information</a>
      <div class="bulk-upload__actions">
        <button class="btn btn--primary btn--lg"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Upload CSV</button>
        <a href="#" class="bulk-upload__download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download example</a>
      </div>
      <p class="bulk-upload__hint">You can drag &amp; drop your file here</p>
    </div>
    </div>
    
  </div>
</div>
<script src="interactions.js"></script>
</body>
</html>
