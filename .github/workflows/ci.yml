name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

# All jobs gate on: not a forked-repo PR. Forks can't run the Supabase stack
# safely (secrets would leak via workflow logs) and we have no integration
# path for them yet.
env:
  RUN_CI: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  typecheck:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run typecheck

  lint:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint

  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase local stack
        # Only Postgres + PostgREST + Studio are needed by the Vitest
        # suite. Excluding auth/realtime/storage/imgproxy/inbucket/
        # edge-runtime/pooler both speeds up boot and sidesteps
        # per-version config schema drift in those sections.
        run: |
          supabase start \
            --exclude auth,realtime,storage,imgproxy,inbucket,edge-runtime,pooler,logflare,vector,studio
      - name: Run Vitest suite
        run: npm test
      - name: Stop Supabase local stack
        if: always()
        run: supabase stop --no-backup || true
