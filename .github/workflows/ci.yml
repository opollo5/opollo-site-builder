name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

# All jobs gate on: not a forked-repo PR. Forks can't run the Supabase stack
# safely (secrets would leak via workflow logs) and we have no integration
# path for them yet.
env:
  RUN_CI: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  # Fails when two files in supabase/migrations/ or supabase/rollbacks/ share
  # the same numeric version prefix (everything before the first underscore).
  # supabase_migrations.schema_migrations enforces UNIQUE on version, so two
  # files with the same prefix mean `supabase db push` silently skips one of
  # them — the missing-create_invite staging incident was a real instance.
  migration-versions:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Check for duplicate migration version prefixes
        run: |
          set -euo pipefail
          # Versions present on main today that collide but cannot be
          # renumbered without an ops migration (each affected migration
          # is already applied to at least one environment, so renaming
          # the file would make supabase db push try to re-apply it).
          # Each entry here needs a tracked follow-up to renumber + run
          # supabase migration repair across staging + prod.
          # Empty: the historical 0031 collision was resolved by
          # renumbering 0031_optimiser_clients.sql → 0069. Production
          # recovery for environments mid-collision is handled by
          # deploy-migrations.yml's `repair_versions_applied` input.
          allowlist=""
          fail=0
          for dir in supabase/migrations supabase/rollbacks; do
            [ -d "$dir" ] || continue
            all_dupes=$(ls "$dir" | grep -E '\.sql$' | awk -F_ '{print $1}' | sort | uniq -d || true)
            dupes=""
            while read -r v; do
              [ -z "$v" ] && continue
              if grep -qFx "$v" <<< "$allowlist"; then
                echo "::warning::$dir: version $v collides but is allow-listed (historical)."
                continue
              fi
              dupes+="$v"$'\n'
            done <<< "$all_dupes"
            if [ -n "$dupes" ]; then
              echo "::error::Duplicate version prefixes in $dir:"
              while read -r v; do
                [ -z "$v" ] && continue
                echo "  $v collides between:"
                ls "$dir" | grep "^${v}_" | sed 's/^/    /'
              done <<< "$dupes"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo
            echo "Each migration must have a unique numeric version prefix."
            echo "supabase_migrations.schema_migrations enforces UNIQUE on the"
            echo "version, so two files sharing a prefix mean supabase db push"
            echo "silently skips one. Renumber the newer file to the next free"
            echo "slot, and reserve the number in docs/WORK_IN_FLIGHT.md so a"
            echo "parallel session can't grab it again."
            exit 1
          fi
          echo "OK — no duplicate version prefixes (or only allow-listed ones)."

  typecheck:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run typecheck

  lint:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint
      - run: npm run lint:css

  static-audit:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      # PLATFORM-AUDIT — runs scripts/audit.ts (eight static checks).
      # Exit code 1 on any HIGH severity issue → fails the job.
      # See scripts/audit.ts header for the full check list. Output is
      # captured to /tmp/audit.out so the failing-run summary step can
      # paste it back as a PR comment.
      - name: Run audit:static
        env:
          NO_COLOR: "1"
        run: |
          set -o pipefail
          npm run audit:static 2>&1 | tee /tmp/audit.out

  build:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build

  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # pull-requests: write is required by the "Post vitest output on
    # failure" step below. It lets the step upsert a comment on the PR
    # with the tail of /tmp/vitest.out so the failing assertion is
    # readable without downloading the full job-log zip (which requires
    # repo-admin rights and blocks operators + the CI-assist bot).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Show Supabase CLI version
        run: supabase --version
      - name: Start Supabase local stack (with debug output)
        run: supabase start --debug
      - name: Show Supabase stack status (for CI debugging)
        id: supabase_status
        run: |
          supabase status | tee /tmp/supabase-status.txt
          echo "---- JSON ----" | tee -a /tmp/supabase-status.txt
          supabase status --output json | tee -a /tmp/supabase-status.txt || true
      - name: Run Vitest suite
        id: vitest
        run: |
          set -o pipefail
          npm test -- --reporter=verbose 2>&1 | tee /tmp/vitest.out
      - name: Publish test diagnostics to job summary
        if: always()
        run: |
          {
            echo '## Supabase status'
            echo
            echo '```'
            cat /tmp/supabase-status.txt 2>/dev/null || echo '(missing)'
            echo '```'
            echo
            echo '## Vitest output'
            echo
            echo '```'
            tail -c 60000 /tmp/vitest.out 2>/dev/null || echo '(missing)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Post vitest output as PR comment on failure
        # Only on PR runs (push-to-main has no PR to comment on) and only
        # when a prior step in this job failed (typically "Run Vitest
        # suite"). Upserts one comment per PR, keyed by the marker in the
        # body, so rerunning doesn't spam the PR.
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VITEST_LOG_PATH: /tmp/vitest.out
          SUPABASE_LOG_PATH: /tmp/supabase-status.txt
        with:
          script: |
            const fs = require('fs');
            function safeRead(p) {
              try { return fs.readFileSync(p, 'utf8'); } catch { return ''; }
            }
            // Strip ANSI color / cursor escape sequences so the comment
            // renders cleanly in GitHub's markdown.
            function stripAnsi(s) {
              return s.replace(/\x1B\[[0-?]*[ -/]*[@-~]/g, '');
            }
            const MAX = 55000; // Stay well under GitHub's 65 kB comment cap.
            function tail(s) {
              if (s.length <= MAX) return s;
              return '...[truncated; last ' + MAX + ' bytes shown]...\n\n' + s.slice(-MAX);
            }
            const vitestRaw = safeRead(process.env.VITEST_LOG_PATH);
            const vitest = tail(stripAnsi(vitestRaw)) || '(vitest output file empty or missing)';
            const supabase = stripAnsi(safeRead(process.env.SUPABASE_LOG_PATH)) || '(supabase status not captured)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- ci-vitest-failure-comment -->';
            const body = [
              marker,
              `## CI test job failed on \`${context.sha.slice(0, 7)}\``,
              '',
              `[Full job log](${runUrl}) — below is the tail of vitest output.`,
              '',
              '<details open><summary>Vitest output (tail)</summary>',
              '',
              '```',
              vitest,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Supabase stack status</summary>',
              '',
              '```',
              supabase,
              '```',
              '',
              '</details>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (c) => typeof c.body === 'string' && c.body.startsWith(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Stop Supabase local stack
        if: always()
        run: supabase stop --no-backup || true
