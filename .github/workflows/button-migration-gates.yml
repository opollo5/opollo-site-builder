name: Button Migration Gates

on:
  push:
    branches: [refactor/button-migration-cleanup]
  pull_request:
    types: [opened, synchronize]

jobs:
  gates:
    name: Button migration completeness gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gate 1 — no invalid Button variants
        run: |
          MATCHES=$(grep -rn 'variant="helpful"\|variant="hint"' \
            components/ app/ --include="*.tsx" \
            | grep -v "Callout\|callout" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ FAIL: invalid Button variants found"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ no invalid Button variants"

      - name: Gate 2 — no legacy --pk/--bl/--gr/--am/--rd tokens
        run: |
          MATCHES=$(grep -rn 'var(--pk)\|var(--bl)\|var(--gr-soft)\|var(--am)\|var(--rd)' \
            components/ app/ --include="*.css" --include="*.tsx" --include="*.ts" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ FAIL: legacy tokens still referenced"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ no legacy tokens"

      - name: Gate 3 — no hardcoded Tailwind status colours
        run: |
          MATCHES=$(grep -rPn "bg-emerald-50(?![0-9])|bg-amber-50(?![0-9])|bg-rose-50(?![0-9])|bg-orange-50(?![0-9])" \
            components/ app/ --include="*.tsx" \
            | grep -v "design-system-dev\|DesignSystemSettings" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ FAIL: hardcoded status colours found"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ no hardcoded status colours"

      - name: Gate 4 — legacy token definitions removed from globals.css
        run: |
          MATCHES=$(grep -n '^\s*--\(pk\|bl\|gr\|am\|rd\):' app/globals.css || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ FAIL: legacy token definitions still present in globals.css"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ legacy token definitions removed"

      - name: Gate 5 — semantic colour tokens defined
        run: |
          for TOKEN in "color-success-bg" "color-warning-bg" "color-danger-bg"; do
            if ! grep -q "\-\-$TOKEN" app/globals.css; then
              echo "❌ FAIL: --$TOKEN not defined in globals.css"
              exit 1
            fi
          done
          echo "✓ semantic colour tokens defined"

      - name: Gate 6 — AI Generate button uses filled (default) variant
        run: |
          MATCHES=$(grep -n 'data-testid="ai-generate-button"' \
            components/social/composer/ToolsRow.tsx || true)
          if echo "$MATCHES" | grep -q 'variant='; then
            echo "❌ FAIL: ai-generate-button has an explicit variant (should use default filled)"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ ai-generate-button uses default filled variant"

      - name: Gate 8 — UAT sign-in route is staging-guarded
        run: |
          ROUTE=app/api/uat/sign-in/route.ts
          if [ ! -f "$ROUTE" ]; then
            echo "❌ FAIL: UAT route missing at $ROUTE"; exit 1
          fi
          if ! grep -q "VERCEL_ENV\|NEXT_PUBLIC_APP_ENV" "$ROUTE"; then
            echo "❌ FAIL: UAT route missing env guard (VERCEL_ENV or NEXT_PUBLIC_APP_ENV)"; exit 1
          fi
          if ! grep -q "STAGING_UAT_SECRET\|UAT_SECRET" "$ROUTE"; then
            echo "❌ FAIL: UAT route missing bearer secret check (STAGING_UAT_SECRET)"; exit 1
          fi
          echo "✓ UAT sign-in route guarded"

      - name: Gate 7 — AI assist Dialog has exactly one close affordance (DialogContent built-in)
        run: |
          # AiPanel must NOT render its own close button alongside DialogContent's built-in one.
          PANEL_BLOCK=$(awk '/function AiPanel/,/^}/' components/social/composer/ToolsRow.tsx)
          COUNT=$(echo "$PANEL_BLOCK" | grep -c 'label="Close AI panel"\|data-testid="ai-close"' || true)
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ FAIL: AiPanel renders $COUNT custom close button(s) — DialogContent already provides one"
            exit 1
          fi
          echo "✓ AiPanel has no duplicate close button"

      - name: Gate 10 — Composer enforces post-state actions matrix
        # Pins the state→action contract from
        # docs/investigations/composer-state-model-2026-05-25.md.
        # The matrix file must exist, the composer must consume it,
        # and the drafts PATCH endpoint must guard terminal states.
        run: |
          # 1. The matrix file must exist.
          if [ ! -f lib/social/post-state-actions.ts ]; then
            echo "❌ FAIL: lib/social/post-state-actions.ts missing — the canonical state→action matrix has been removed"
            exit 1
          fi

          # 2. canPerform / ALLOWED_ACTIONS must be referenced from the composer.
          if ! grep -rqE "canPerform|ALLOWED_ACTIONS" \
            components/social/composer/ --include="*.tsx"; then
            echo "❌ FAIL: composer/*.tsx does not import canPerform or ALLOWED_ACTIONS — the matrix is not enforced in the UI"
            exit 1
          fi

          # 3. The drafts/[id] PATCH endpoint must guard against terminal states.
          DRAFT_ROUTE="app/api/platform/social/drafts/[id]/route.ts"
          if [ ! -f "$DRAFT_ROUTE" ]; then
            echo "⚠ WARN: drafts/[id] route file not found at $DRAFT_ROUTE — skipping guard check"
          else
            if ! grep -qE "published|publishing" "$DRAFT_ROUTE"; then
              echo "❌ FAIL: drafts PATCH endpoint at $DRAFT_ROUTE does not guard terminal states (no 'published'/'publishing' reference)"
              exit 1
            fi
          fi

          echo "✓ post-state contract enforced"

      - name: Gate 9 — UAT specs do not use waitForLoadState('networkidle')
        # See issue #1049. networkidle is a Playwright anti-pattern that
        # never settles against real pages (telemetry, websockets, realtime
        # channels). Use explicit web assertions (toBeVisible etc.) instead.
        # Ref: https://playwright.dev/docs/api/class-page#page-wait-for-load-state
        run: |
          MATCHES=$(grep -rn "waitForLoadState.*networkidle" e2e/uat/ --include="*.ts" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ FAIL: UAT specs must not use waitForLoadState('networkidle')"
            echo "$MATCHES"
            echo ""
            echo "Use explicit web assertions instead:"
            echo "  await expect(locator).toBeVisible({ timeout: 10_000 });"
            echo "See: https://playwright.dev/docs/api/class-page#page-wait-for-load-state"
            exit 1
          fi
          echo "✓ no networkidle in UAT specs"
