name: Production triage queries (temporary)
# ONE-SHOT diagnostic workflow — delete after use.
# Runs read-only COUNT queries against production to assess V1→V2 migration state.

on:
  workflow_dispatch:

jobs:
  triage:
    name: Run triage queries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Q1 — V1 posts soft-deleted by 0157
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Q1: V1 posts soft-deleted by 0157 ==="
          supabase db query --linked "
            SELECT COUNT(*) AS v1_posts_soft_deleted_by_0157
              FROM social_post_master
             WHERE deleted_at >= '2026-05-28T05:04:22Z';
          "

      - name: Q2 — V1 variants soft-deleted by 0157
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Q2: V1 variants soft-deleted by 0157 ==="
          supabase db query --linked "
            SELECT COUNT(*) AS v1_variants_soft_deleted_by_0157
              FROM social_post_variant
             WHERE deleted_at >= '2026-05-28T05:04:22Z';
          "

      - name: Q3 — V1 schedule entries cancelled by 0157
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Q3: V1 schedule entries cancelled by 0157 ==="
          supabase db query --linked "
            SELECT COUNT(*) AS v1_schedule_entries_cancelled_by_0157
              FROM social_schedule_entries
             WHERE cancelled_at >= '2026-05-28T05:04:22Z';
          "

      - name: Q4 — V2 drafts from V1 migration
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Q4: V2 drafts from V1 migration ==="
          supabase db query --linked "
            SELECT COUNT(*) AS v2_drafts_from_v1_migration
              FROM social_post_drafts
             WHERE idempotency_key LIKE 'v1-migration-%';
          "

      - name: Q5 — Migration tracking rows for 0155/0156/0157
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Q5: Migration tracking rows ==="
          supabase db query --linked "
            SELECT version, name
              FROM supabase_migrations.schema_migrations
             WHERE version IN ('0155', '0156', '0157')
             ORDER BY version;
          "

      - name: Summary
        if: always()
        run: |
          {
            echo '## Production triage — V1→V2 soft-delete assessment'
            echo 'See step logs above for counts.'
            echo 'Timestamp assessed: 2026-05-28T05:04:22Z (when 0157 applied)'
          } >> "$GITHUB_STEP_SUMMARY"
