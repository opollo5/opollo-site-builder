# Supabase CLI local config. Mirrors the canonical `supabase init` template
# from https://github.com/supabase/cli/blob/main/pkg/config/templates/config.toml
# with major_version pinned to 15 for parity with the Sydney prod DB and
# non-essential services disabled to reduce boot time / surface area on CI.

project_id = "opollo-site-builder"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = false

[studio]
enabled = false
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false
file_size_limit = "50MiB"

[auth]
# Must be enabled so the CLI generates + prints SERVICE_ROLE_KEY and
# ANON_KEY to `supabase status` output. The gotrue container booting is
# the signal that those keys exist; CLI 2.9x omits them from status
# entirely when auth is disabled.
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
# Enable password-based email login/signup for local dev and CI. M2b's
# RLS matrix tests call signInWithPassword() to mint per-role JWTs;
# gotrue refuses the method unless enable_signup is true. M2c's
# /login route will need this live in every dev environment anyway.
# enable_confirmations = false lets admin.createUser return
# immediately-usable accounts (no inbucket hop).
enable_signup = true
double_confirm_changes = false
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = ""

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[edge_runtime]
enabled = false
policy = "oneshot"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = false
port = 54327
backend = "postgres"

[experimental]
