# Minimal Supabase CLI local config. Matches the bare schema every CLI
# version has accepted: project_id at root + [api] + [db]. We exclude all
# other services at `supabase start` time in the workflow rather than
# trying to disable them via config (section schema has changed across
# CLI versions; `--exclude` is stable).

project_id = "opollo-site-builder"

[api]
port = 54321

[db]
port = 54322
shadow_port = 54320
major_version = 15
