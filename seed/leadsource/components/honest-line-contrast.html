<section class="ls-honest">
  <div class="ls-container ls-honest__inner">
    <div class="ls-eyebrow">{{eyebrow}}</div>
    <div class="ls-honest__quote">
      {{quote_prefix}} <span class="ls-arc">{{quote_accent}}</span>{{quote_suffix}}
    </div>
    <div class="ls-honest__contrast">
      <div class="ls-honest-card">
        <div class="ls-honest-card__label">{{left_card.label}}</div>
        <div class="ls-honest-card__text">{{left_card.text}}</div>
      </div>
      <div class="ls-honest-arrow">→</div>
      <div class="ls-honest-card ls-honest-card--right">
        <div class="ls-honest-card__label">{{right_card.label}}</div>
        <div class="ls-honest-card__text">{{right_card.text}}</div>
      </div>
    </div>
  </div>
</section>
